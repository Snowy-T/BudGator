workflows:
  sideloadly_ipa:
    name: Sideloadly IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Build unsigned IPA for Sideloadly
        script: |
          chmod +x scripts/build_ipa_for_sideloadly.sh
          ./scripts/build_ipa_for_sideloadly.sh

    artifacts:
      - build/ios/iphoneos/Budgator.ipa

  sideloadly_ipa_auto_build_number:
    name: Sideloadly IPA (Auto Build Number)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Build unsigned IPA for Sideloadly (auto build number)
        script: |
          chmod +x scripts/build_ipa_for_sideloadly.sh
          export CI_BUILD_NUMBER="$BUILD_NUMBER"
          ./scripts/build_ipa_for_sideloadly.sh

    artifacts:
      - build/ios/iphoneos/Budgator.ipa
